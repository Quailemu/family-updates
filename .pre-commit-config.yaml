repos:
  - repo: local
    hooks:
      - id: transcript-mojibake-guard
        name: Transcript mojibake guard
        entry: python scripts/transcript_guard.py --check
        language: system
        files: ^docs/walkthrough-transcripts/.*\.md$
        pass_filenames: true
      - id: normalize-mojibake-text
        name: Normalize mojibake text (check)
        entry: python scripts/normalize_text.py --check
        language: system
        pass_filenames: false
      - id: check-mojibake-encoding
        name: Check mojibake encoding
        entry: python scripts/check_encoding.py
        language: system
        pass_filenames: false
